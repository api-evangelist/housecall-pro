naftiko: 1.0.0-alpha2
info:
  label: Housecall Pro Public API — Jobs
  description: Housecall Pro Public API — Jobs. CRUD operations against the /jobs resource for managing home
    services jobs, schedule windows, work statuses, line items, and assigned employees.
  tags:
  - Housecall Pro
  - Jobs
  - Scheduling
  - Field Service
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    HOUSECALL_PRO_API_KEY: HOUSECALL_PRO_API_KEY
capability:
  consumes:
  - type: http
    namespace: jobs
    baseUri: https://api.housecallpro.com
    description: Housecall Pro Jobs business capability.
    resources:
    - name: jobs
      path: /jobs
      operations:
      - name: listjobs
        method: GET
        description: List Housecall Pro Jobs
        outputRawFormat: json
      - name: createjob
        method: POST
        description: Create A Housecall Pro Job
        outputRawFormat: json
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: job
      path: /jobs/{job_id}
      operations:
      - name: getjob
        method: GET
        description: Get A Housecall Pro Job
        inputParameters:
        - name: job_id
          in: path
          type: string
          required: true
      - name: updatejob
        method: PUT
        description: Update A Housecall Pro Job
        inputParameters:
        - name: job_id
          in: path
          type: string
          required: true
      - name: deletejob
        method: DELETE
        description: Delete A Housecall Pro Job
        inputParameters:
        - name: job_id
          in: path
          type: string
          required: true
    - name: job-line-items
      path: /jobs/{job_id}/line_items
      operations:
      - name: listjoblineitems
        method: GET
        description: List Job Line Items
        inputParameters:
        - name: job_id
          in: path
          type: string
          required: true
    - name: job-appointments
      path: /jobs/{job_id}/appointments
      operations:
      - name: listjobappointments
        method: GET
        description: List Job Appointments
        inputParameters:
        - name: job_id
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: 'Token {{env.HOUSECALL_PRO_API_KEY}}'
      placement: header
