meters:
  - name: seat_subscription
    unit: seat-month
    aggregation: sum
    dimensions:
      - plan
      - billing_period
  - name: additional_seats
    unit: seat-month
    aggregation: sum
    dimensions:
      - plan
  - name: vehicle_gps
    unit: vehicle-month
    aggregation: sum
  - name: payment_processing_fees
    unit: transaction
    aggregation: sum
    dimensions:
      - card_type
      - payment_method
notes:
  - API access is included only in the MAX plan; downgrading revokes API keys.
  - Payment processing fees are pass-through (interchange + Housecall Pro Pay markup).
  - Annual billing offers a roughly 25 percent discount versus monthly billing.
